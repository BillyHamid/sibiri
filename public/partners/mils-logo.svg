<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="20" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>

  <!-- MILS Text -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="56" font-weight="bold"
        text-anchor="middle" dominant-baseline="central" fill="#D32F2F">MILS</text>

  <!-- Decorative line -->
  <line x1="50" y1="130" x2="150" y2="130" stroke="#D32F2F" stroke-width="3" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="10" font-weight="600"
        text-anchor="middle" fill="#666">LEADER MONDIAL</text>
</svg>
