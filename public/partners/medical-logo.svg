<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="#2ECC71" stroke="#E74C3C" stroke-width="12"/>

  <!-- Caduceus (Medical Symbol) -->
  <g transform="translate(100, 100)">
    <!-- Staff -->
    <rect x="-3" y="-50" width="6" height="100" fill="#F4D03F"/>

    <!-- Snake 1 (left) -->
    <path d="M -15 -20 Q -30 -10 -25 5 Q -20 15 -10 15" stroke="#2ECC71" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Snake 2 (right) -->
    <path d="M 15 -20 Q 30 -10 25 5 Q 20 15 10 15" stroke="#2ECC71" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Wings -->
    <path d="M -3 -30 L -25 -40 L -15 -20" fill="#F4D03F"/>
    <path d="M 3 -30 L 25 -40 L 15 -20" fill="#F4D03F"/>
  </g>
</svg>
